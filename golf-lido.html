<style>
  :root {
    --green: #2D6A4F;
    --green-light: #52B788;
    --green-pale: #D8F3DC;
    --sand: #F9F3E8;
    --charcoal: #1B2021;
    --muted: #7A8B7E;
    --white: #FFFFFF;
    --bus-a: #E76F51;
    --bus-11: #457B9D;
    --radius: 16px;

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: var(--sand);
    color: var(--charcoal);
    min-height: 100vh;
    padding-bottom: calc(20px + var(--safe-bottom));
  }

  header {
    background: var(--green);
    padding: calc(var(--safe-top) + 18px) 20px 18px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }
  .header-left h1 { font-size: 26px; font-weight: 700; color: var(--white); letter-spacing: -0.5px; line-height: 1; }
  .header-left .subtitle { font-size: 13px; color: var(--green-pale); margin-top: 4px; font-weight: 400; }
  .time-display { text-align: right; }
  .time-display .now { font-size: 28px; font-weight: 600; color: var(--white); font-variant-numeric: tabular-nums; letter-spacing: -1px; }
  .time-display .date { font-size: 11px; color: var(--green-light); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.8px; }

  /* Direction toggle (Aller/Retour) */
  .dir-toggle {
    margin: 14px 20px 0;
    display: flex;
    background: #1f4f3a;
    border-radius: 12px;
    padding: 4px;
    gap: 4px;
  }
  .dir-btn {
    flex: 1;
    padding: 10px 0;
    border: none;
    border-radius: 9px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    color: rgba(255,255,255,0.5);
    letter-spacing: -0.2px;
  }
  .dir-btn.active {
    background: var(--white);
    color: var(--green);
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }

  /* Feriale/Festivo toggle */
  .tipo-toggle {
    margin: 10px 20px 0;
    display: flex;
    background: #DDE8E0;
    border-radius: 10px;
    padding: 3px;
    gap: 3px;
  }
  .tipo-btn {
    flex: 1;
    padding: 7px 0;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    color: var(--muted);
  }
  .tipo-btn.active { background: var(--white); color: var(--green); box-shadow: 0 1px 4px rgba(0,0,0,0.12); }

  .section-label {
    font-size: 11px; font-weight: 700; color: var(--muted);
    letter-spacing: 1.2px; text-transform: uppercase; padding: 16px 20px 8px;
  }
  .departures { padding: 0 20px; display: flex; flex-direction: column; gap: 10px; }

  .card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 16px 18px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 0 14px;
    align-items: center;
    position: relative;
    overflow: hidden;
  }
  .card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
  .card.bus-a::before { background: var(--bus-a); }
  .card.bus-11::before { background: var(--bus-11); }
  .card.next { border: 1.5px solid var(--green-light); }

  .badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 44px; height: 44px; border-radius: 10px;
    font-size: 13px; font-weight: 800; letter-spacing: -0.3px;
  }
  .card.bus-a .badge { background: #FDEDE8; color: var(--bus-a); }
  .card.bus-11 .badge { background: #E8F1F7; color: var(--bus-11); }

  .card-middle { display: flex; flex-direction: column; gap: 3px; }
  .depart-time { font-size: 22px; font-weight: 700; color: var(--charcoal); font-variant-numeric: tabular-nums; letter-spacing: -0.5px; line-height: 1; }
  .route-info { font-size: 12px; color: var(--muted); line-height: 1.3; }
  .dest-name { font-weight: 600; color: var(--charcoal); font-size: 13px; }

  .card-right { text-align: right; }
  .arr-time { font-size: 17px; font-weight: 600; color: var(--green); font-variant-numeric: tabular-nums; }
  .countdown { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .countdown.imminent { color: #E76F51; font-weight: 600; }

  /* Compte à rebours principal — plus grand */
  .countdown-big {
    font-size: 20px;
    font-weight: 700;
    color: var(--green);
    font-variant-numeric: tabular-nums;
    margin-top: 3px;
    letter-spacing: -0.5px;
  }
  .countdown-big.imminent { color: #E76F51; }

  .next-tag {
    position: absolute; top: 10px; right: 12px;
    font-size: 9px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase;
    color: var(--green); background: var(--green-pale); padding: 2px 6px; border-radius: 4px;
  }
  .no-service { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 15px; }
  .no-service .icon { font-size: 40px; margin-bottom: 10px; }

  .info-box {
    margin: 14px 20px 0;
    background: #E8F4EC;
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 12px;
    color: var(--green);
    line-height: 1.6;
  }
  .info-box strong { font-weight: 700; }

  .refresh-btn {
    display: block; margin: 14px 20px 0; width: calc(100% - 40px);
    padding: 14px; background: var(--green); color: white; border: none;
    border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer;
  }
  .refresh-btn:active { opacity: 0.85; }

  .divider { height: 1px; background: #E8ECE9; margin: 14px 20px; }
  .legend { margin: 0 20px 20px; display: flex; flex-direction: column; gap: 6px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
</style>

// ═══════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════

function toMin(str) {
  const [h, m] = str.split(':').map(Number);
  return h * 60 + m;
}
function minToStr(m) {
  m = ((m % 1440) + 1440) % 1440;
  return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
}
function getNowMin() {
  const n = new Date(); return n.getHours()*60 + n.getMinutes();
}
function isFestivo() { return new Date().getDay() === 0; }
function getJourLabel() {
  const d = new Date();
  const days = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const months = ['jan','fév','mar','avr','mai','juin','jul','aoû','sep','oct','nov','déc'];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
}
function getTipoLabel(tipo) {
  if (tipo === 'festivo') return 'Festivo';
  if (tipo === 'feriale') return 'Feriale';
  return isFestivo() ? 'Festivo' : 'Feriale';
}

// ═══════════════════════════════════════════════════
// ÉTAT
// ═══════════════════════════════════════════════════

let tipoMode = 'auto';
let dirMode  = 'aller';

function setTipo(t) {
  tipoMode = t;
  document.querySelectorAll('.tipo-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + t).classList.add('active');
  render();
}
function setDir(d) {
  dirMode = d;
  document.querySelectorAll('.dir-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + d).classList.add('active');
  render();
}

// ═══════════════════════════════════════════════════
// LOGIQUE
// ═══════════════════════════════════════════════════

function getEffectiveFestivo() {
  if (tipoMode === 'festivo') return true;
  if (tipoMode === 'feriale') return false;
  return isFestivo();
}

function getNextSimple(schedules, nowMin, count) {
  // schedules: array of { dep, arr } or [dep, arr]
  const results = [];
  for (const e of schedules) {
    const dep = Array.isArray(e) ? e[0] : e.dep;
    const arr = Array.isArray(e) ? e[1] : e.arr;
    let diff = dep - nowMin;
    if (diff < 0) diff += 1440;
    results.push({ dep, arr, diff });
  }
  results.sort((a, b) => a.diff - b.diff);
  return results.slice(0, count);
}

function getNextAllerA(nowMin, count) {
  const results = [];
  for (const e of BUS_A_ALLER) {
    let diff = e.dep - nowMin;
    if (diff < 0) diff += 1440;
    results.push({ dep: e.dep, arr: e.arr, diff, spiaggia: e.spiaggia });
  }
  results.sort((a, b) => a.diff - b.diff);
  return results.slice(0, count);
}

function mergeAndSort(...arrays) {
  return arrays.flat().sort((a, b) => a.diff - b.diff);
}

// ═══════════════════════════════════════════════════
// RENDU
// ═══════════════════════════════════════════════════

function render() {
  const nowMin = getNowMin();

  // Mise à jour header
  const sub = document.getElementById('header-subtitle');
  if (dirMode === 'aller') {
    sub.textContent = 'Prochains départs depuis S.M.E.';
  } else {
    sub.textContent = 'Prochains départs depuis Golf';
  }

  // Légende
  const legendBox = document.getElementById('legend-box');
  if (dirMode === 'aller') {
    legendBox.innerHTML = `
      <div class="legend-item"><div class="legend-dot" style="background:var(--bus-a)"></div>Bus A → Arrêt <strong>Golf</strong>, ou <strong>Ca' Rossa</strong> si bus Spiaggia</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--bus-11)"></div>Bus 11 → <strong>Alberoni Della Droma</strong></div>`;
  } else {
    legendBox.innerHTML = `
      <div class="legend-item"><div class="legend-dot" style="background:var(--bus-a)"></div>Bus A → Départ <strong>Golf</strong> (Faro Rocchetta +1min) → <strong>S.M.E.</strong></div>`;
  }

  let top3;
  if (dirMode === 'aller') {
    const nextA  = getNextAllerA(nowMin, 3).map(x => ({ ...x, type: 'A' }));
    const next11 = getNextSimple(BUS_11_ALLER, nowMin, 3).map(x => ({ ...x, type: '11' }));
    top3 = mergeAndSort(nextA, next11).slice(0, 3);
  } else {
    top3 = getNextSimple(BUS_A_RETOUR, nowMin, 3).map(x => ({ ...x, type: 'A' }));
  }

  const container = document.getElementById('departures-container');
  if (!top3.length) {
    container.innerHTML = `<div class="no-service"><div class="icon">🌙</div>Pas de service pour le moment</div>`;
    return;
  }

  let html = `<div class="section-label">Prochains départs — ${getTipoLabel(tipoMode)}</div><div class="departures">`;

  top3.forEach((trip, i) => {
    const depStr = minToStr(trip.dep);
    const arrStr = minToStr(trip.arr);
    const isNext = i === 0;
    const typeClass = trip.type === 'A' ? 'bus-a' : 'bus-11';

    // Countdown affiché pour les cartes 2 et 3
    let countdownHtml = '';
    if (isNext) {
      countdownHtml = `<div class="countdown-big" id="countdown-next"></div>`;
    } else {
      const mins = trip.diff;
      let txt = '', cls = 'countdown';
      if (mins <= 5)       { txt = `dans ${mins} min`; cls = 'countdown imminent'; }
      else if (mins < 60)  { txt = `dans ${mins} min`; }
      else { const h=Math.floor(mins/60),m=mins%60; txt=m>0?`dans ${h}h${String(m).padStart(2,'0')}`:`dans ${h}h`; }
      countdownHtml = `<div class="${cls}">${txt}</div>`;
    }

    let destName = '', routeInfo = '';
    if (dirMode === 'aller') {
      if (trip.type === 'A') {
        if (trip.spiaggia) {
          destName = 'Ca\' Rossa';
          routeInfo = 'Bus A · Via Sandro Gallo <strong style="color:var(--bus-a)">→ SPIAGGIA</strong>';
        } else {
          destName = 'Golf';
          routeInfo = 'Bus A · Via Sandro Gallo → Faro Rocchetta';
        }
      } else {
        destName = 'Alberoni Della Droma';
        routeInfo = 'Bus 11 · Direct Lido→Alberoni';
      }
    } else {
      destName = 'S.Maria Elisabetta';
      routeInfo = 'Bus A · Via Sandro Gallo';
    }

    html += `
    <div class="card ${typeClass}${isNext ? ' next' : ''}">
      ${isNext ? '<div class="next-tag">PROCHAIN</div>' : ''}
      <div class="badge">${trip.type === 'A' ? 'BUS A' : 'N°11'}</div>
      <div class="card-middle">
        <div class="depart-time">${depStr}</div>
        <div class="dest-name">${destName}</div>
        <div class="route-info">${routeInfo}</div>
      </div>
      <div class="card-right">
        <div class="arr-time">${arrStr}</div>
        ${countdownHtml}
      </div>
    </div>`;

    if (isNext) window._nextDepMin = trip.dep;
  });

  html += '</div>';

  // Info box
  if (dirMode === 'aller') {
    html += `<div class="info-box">
      <strong>⛳ Arrêts :</strong><br>
      Bus A (xx:16 xx:36 xx:56) → <strong>Golf</strong> · Bus A (xx:06 xx:26 xx:46) → <strong>Ca' Rossa</strong> → Spiaggia<br>
      Bus 11 → <strong>Alberoni Della Droma</strong>
    </div>`;
  } else {
    html += `<div class="info-box">
      <strong>🏠 Retour :</strong><br>
      Départ <strong>Golf</strong> (arrêt Faro Rocchetta +1min)<br>
      Arrivée <strong>S.Maria Elisabetta</strong>
    </div>`;
  }

  container.innerHTML = html;
}

// ═══════════════════════════════════════════════════
// HORLOGE & COMPTE À REBOURS
// ═══════════════════════════════════════════════════

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  document.getElementById('dateLabel').textContent = getJourLabel();
}

function updateCountdown() {
  const el = document.getElementById('countdown-next');
  if (!el || window._nextDepMin === undefined) return;
  const now = new Date();
  const nowSec = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();
  let diff = window._nextDepMin * 60 - nowSec;
  if (diff < 0) diff += 86400;
  if (diff > 7200) { render(); return; }
  if (diff <= 0) { el.textContent = 'En route !'; el.className = 'countdown-big imminent'; setTimeout(render, 5000); return; }

  const mm = Math.floor(diff / 60);
  const ss = diff % 60;
  let txt, cls = 'countdown-big';
  if (diff < 60)       { txt = `${ss}s`; cls += ' imminent'; }
  else if (diff < 300) { txt = `${mm}m ${String(ss).padStart(2,'0')}s`; cls += ' imminent'; }
  else                 { txt = `${mm}m ${String(ss).padStart(2,'0')}s`; }
  el.textContent = txt;
  el.className = cls;
}

updateClock();
render();
updateCountdown();
setInterval(() => { updateClock(); updateCountdown(); }, 1000);
setInterval(render, 30000);
</script>
